# plan-execute-review: 三阶段工作流模板
# 流程: 规划 → 执行 → 审查
#
# 适用场景:
# - 复杂任务分解与执行
# - 需要审查把关的任务
# - 需要反馈循环的迭代任务

id: plan-execute-review
name: "规划-执行-审查"
description: "三阶段工作流：先规划任务，再执行，最后审查结果"
version: "1.0"
max_iterations: 10
timeout: 1800

nodes:
  - id: planner
    agent_id: default
    node_type: agent
    description: "分析任务并制定执行计划"
    input_template: |
      请分析以下任务，制定详细的执行计划：

      {workflow.input}

      要求：
      1. 将任务分解为具体步骤
      2. 列出每个步骤的输入和预期输出
      3. 标注可能的风险点
    timeout: 300
    retry: 0

  - id: executor
    agent_id: default
    node_type: agent
    description: "按计划执行任务"
    input_template: |
      请按照以下计划执行任务：

      原始任务：{workflow.input}

      执行计划：
      {planner.output}

      请逐步执行并报告结果。
    timeout: 600
    retry: 1

  - id: reviewer
    agent_id: default
    node_type: agent
    description: "审查执行结果"
    input_template: |
      请审查以下任务的执行结果：

      原始任务：{workflow.input}

      执行计划：
      {planner.output}

      执行结果：
      {executor.output}

      请评估：
      1. 任务是否完成
      2. 结果质量如何
      3. 是否有遗漏或需要改进的地方
    timeout: 300
    retry: 0

edges:
  - from_node: planner
    to_node: executor
    label: "计划完成"
  - from_node: executor
    to_node: reviewer
    label: "执行完成"

entry_node: planner
exit_nodes:
  - reviewer
