# fan-out-merge: 扇出-聚合工作流模板
# 流程: 分发 → 并行处理(A/B/C) → 汇总
#
# 适用场景:
# - 多角度分析（技术/商业/用户）
# - 并行信息收集
# - 投票/共识机制

id: fan-out-merge
name: "扇出-聚合"
description: "将任务分发给多个并行节点处理，最后汇总结果"
version: "1.0"
max_iterations: 10
timeout: 1800

nodes:
  - id: dispatcher
    agent_id: default
    node_type: agent
    description: "分析任务并分发子任务"
    input_template: |
      请分析以下任务，将其拆分为三个独立的子任务：

      {workflow.input}

      请列出三个子任务，每个子任务从不同角度切入。
    timeout: 300
    retry: 0

  - id: worker_a
    agent_id: default
    node_type: agent
    description: "并行处理 - 视角 A"
    input_template: |
      你是视角 A 的分析师。请从技术可行性角度分析以下任务：

      原始任务：{workflow.input}

      任务拆分：
      {dispatcher.output}

      请专注于技术可行性分析。
    timeout: 300
    retry: 0

  - id: worker_b
    agent_id: default
    node_type: agent
    description: "并行处理 - 视角 B"
    input_template: |
      你是视角 B 的分析师。请从用户体验角度分析以下任务：

      原始任务：{workflow.input}

      任务拆分：
      {dispatcher.output}

      请专注于用户体验分析。
    timeout: 300
    retry: 0

  - id: worker_c
    agent_id: default
    node_type: agent
    description: "并行处理 - 视角 C"
    input_template: |
      你是视角 C 的分析师。请从成本效益角度分析以下任务：

      原始任务：{workflow.input}

      任务拆分：
      {dispatcher.output}

      请专注于成本效益分析。
    timeout: 300
    retry: 0

  - id: merger
    agent_id: default
    node_type: agent
    description: "汇总所有并行结果"
    input_template: |
      请汇总以下多角度分析结果，形成综合结论：

      原始任务：{workflow.input}

      技术可行性分析：
      {worker_a.output}

      用户体验分析：
      {worker_b.output}

      成本效益分析：
      {worker_c.output}

      请综合三方分析，给出最终建议。
    timeout: 300
    retry: 0

edges:
  - from_node: dispatcher
    to_node: worker_a
    label: "分发到视角A"
  - from_node: dispatcher
    to_node: worker_b
    label: "分发到视角B"
  - from_node: dispatcher
    to_node: worker_c
    label: "分发到视角C"
  - from_node: worker_a
    to_node: merger
    label: "A完成"
  - from_node: worker_b
    to_node: merger
    label: "B完成"
  - from_node: worker_c
    to_node: merger
    label: "C完成"

entry_node: dispatcher
exit_nodes:
  - merger
