# AgentOS 配置文件示例
# 复制此文件为 config.yml 并填入真实的 API Key

system:
  workspace_dir: ~/.agentos/workspace
  database_path: ~/.agentos/db/agentos.db

security:
  auth_enabled: true

# ════════════════════════════════════════════════════
# LLM 配置
# ════════════════════════════════════════════════════
llm:
  providers:
    anthropic:
      api_key: ${ANTHROPIC_API_KEY}
      base_url: ${ANTHROPIC_BASE_URL}
      timeout: 60
      max_retries: 3

    openai:
      api_key: ${OPENAI_API_KEY}
      base_url: ${OPENAI_BASE_URL}
      timeout: 60
      max_retries: 3

    gemini:
      api_key: ${GEMINI_API_KEY}
      base_url: ${GEMINI_BASE_URL}
      timeout: 120
      max_retries: 3

    kimi:
      api_key: ${KIMI_API_KEY}
      base_url: https://api.moonshot.cn/v1
      timeout: 60
      max_retries: 3

    glm:
      api_key: ${GLM_API_KEY}
      base_url: https://open.bigmodel.cn/api/paas/v4/
      timeout: 60
      max_retries: 3

    minimax:
      api_key: ${MINIMAX_API_KEY}
      base_url: https://api.minimax.chat/v1
      timeout: 60
      max_retries: 3

    qwen:
      api_key: ${QWEN_API_KEY}
      base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
      timeout: 60
      max_retries: 3

    deepseek:
      api_key: ${DEEPSEEK_API_KEY}
      base_url: https://api.deepseek.com
      timeout: 60
      max_retries: 3

    step:
      api_key: ${STEP_API_KEY}
      base_url: https://api.stepfun.com/v1
      timeout: 60
      max_retries: 3

  models:
    # ── Anthropic ──
    claude-opus:
      provider: anthropic
      model_id: claude-opus-4-6
      timeout: 60
      max_output_tokens: 8192

    claude-sonnet:
      provider: anthropic
      model_id: claude-sonnet-4-6
      timeout: 60
      max_output_tokens: 8192

    # ── OpenAI ──
    gpt-5.4:
      provider: openai
      model_id: gpt-5.4
      timeout: 60
      max_output_tokens: 8192

    # ── Gemini ──
    gemini-pro:
      provider: gemini
      model_id: gemini-2.0-flash
      timeout: 120
      max_output_tokens: 8192

    # ── Kimi (Moonshot) ──
    kimi-k2.5:
      provider: kimi
      model_id: kimi-k2.5
      timeout: 60
      max_output_tokens: 262144

    # ── GLM (智谱) ──
    glm-5:
      provider: glm
      model_id: GLM-5
      timeout: 60
      max_output_tokens: 200000

    # ── Minimax ──
    minimax-m2.7:
      provider: minimax
      model_id: MiniMax-M2.7-highspeed
      timeout: 60
      max_output_tokens: 204800

    # ── Qwen (通义千问) ──
    qwen-3.5-plus:
      provider: qwen
      model_id: qwen3.5-plus
      timeout: 60
      max_output_tokens: 1000000

    # ── Deepseek ──
    deepseek-chat:
      provider: deepseek
      model_id: deepseek-chat
      timeout: 60
      max_output_tokens: 128000

    # ── Step (阶跃星辰) ──
    step-3.5-flash:
      provider: step
      model_id: step-3.5-flash
      timeout: 60
      max_output_tokens: 256000

  default_model: gemini-pro

# ════════════════════════════════════════════════════
# Agents 配置
# ════════════════════════════════════════════════════
agents:
  default:
    name: Default Agent
    description: 默认 AI Agent
    model: gemini-pro
    temperature: 0.6
    system_prompt: "你是一个有工具能力的AI助手，请在必要时通过调用工具、使用记忆、或者调用技能来完成任务。"
    tools: []
    skills: []

# ════════════════════════════════════════════════════
# 工具配置
# ════════════════════════════════════════════════════
tools:
  serper_search:
    enabled: true
    api_key: ${SERPER_API_KEY}
    timeout: 15
    max_results: 10

# Skills 配置
skills:
  extra_dirs: []
  entries: {}

# 插件配置
plugins:
  feishu:
    enabled: false
    app_id: "${FEISHU_APP_ID}"
    app_secret: "${FEISHU_APP_SECRET}"
    dm_policy: "open"
    group_policy: "mention"
    log_level: "INFO"
  wecom:
    enabled: false
    bot_id: "${WECOM_BOT_ID}"
    secret: "${WECOM_SECRET}"
    websocket_url: "wss://openws.work.weixin.qq.com"
    dm_policy: "open"
    group_policy: "open"
    allowlist: []
    group_allowlist: []
    show_tool_progress: false
  telegram:
    enabled: false
    bot_token: "${TELEGRAM_BOT_TOKEN}"
    mode: "polling"  # polling | webhook
    dm_policy: "open"  # open | allowlist | disabled
    group_policy: "allowlist"  # open | allowlist | disabled
    allowlist: [ ]
    group_allowlist: [ ]
    group_chat_allowlist: [ ]
    require_mention: true
    show_tool_progress: false
    reply_to_message: true
    polling_timeout_seconds: 30
    webhook_url: ""
    webhook_secret: ""
    webhook_path: "/telegram-webhook"
    webhook_host: "127.0.0.1"
    webhook_port: 8787
  whatsapp:
    enabled: false
    auth_dir: "~/.agentos/data/plugins/whatsapp/auth"
    dm_policy: "open"
    group_policy: "open"
    allowlist: []
    group_allowlist: []
    show_tool_progress: false
    bridge:
      command: "node"
      entry: "agentos/adapters/plugins/whatsapp/bridge/src/index.mjs"
      startup_timeout_seconds: 30
      send_timeout_seconds: 15
