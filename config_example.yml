# Sensenova-Claw 配置文件示例
# 复制此文件为 config.yml 并填入真实的 API Key

system:
  workspace_dir: ~/.sensenova-claw/workspace
  database_path: ~/.sensenova-claw/db/sensenova-claw.db

security:
  auth_enabled: true

# ════════════════════════════════════════════════════
# LLM 配置
# ════════════════════════════════════════════════════
llm:
  providers:
    anthropic:
      api_key: ${ANTHROPIC_API_KEY}
      base_url: ${ANTHROPIC_BASE_URL}
      timeout: 180
      max_retries: 3
      source_type: anthropic

    openai:
      api_key: ${OPENAI_API_KEY}
      base_url: ${OPENAI_BASE_URL}
      timeout: 180
      max_retries: 3
      source_type: openai

    gemini:
      api_key: ${GEMINI_API_KEY}
      base_url: ${GEMINI_BASE_URL}
      timeout: 180
      max_retries: 3
      source_type: gemini

    kimi:
      api_key: ${KIMI_API_KEY}
      base_url: https://api.moonshot.cn/v1
      timeout: 180
      max_retries: 3
      source_type: kimi

    glm:
      api_key: ${GLM_API_KEY}
      base_url: https://open.bigmodel.cn/api/paas/v4/
      timeout: 180
      max_retries: 3
      source_type: glm

    minimax:
      api_key: ${MINIMAX_API_KEY}
      base_url: https://api.minimax.chat/v1
      timeout: 180
      max_retries: 3
      source_type: minimax

    qwen:
      api_key: ${QWEN_API_KEY}
      base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
      timeout: 180
      max_retries: 3
      source_type: qwen

    deepseek:
      api_key: ${DEEPSEEK_API_KEY}
      base_url: https://api.deepseek.com
      timeout: 180
      max_retries: 3
      source_type: deepseek

    step:
      api_key: ${STEP_API_KEY}
      base_url: https://api.stepfun.com/v1
      timeout: 180
      max_retries: 3
      source_type: step

  models:
    # ── Anthropic ──
    claude-opus:
      provider: anthropic
      model_id: claude-opus-4-6
      timeout: 180
      max_tokens: 200000
      max_output_tokens: 16384

    claude-sonnet:
      provider: anthropic
      model_id: claude-sonnet-4-6
      timeout: 180
      max_tokens: 200000
      max_output_tokens: 16384

    # ── OpenAI ──
    gpt-5.4:
      provider: openai
      model_id: gpt-5.4
      timeout: 180
      max_tokens: 128000
      max_output_tokens: 16384

    # ── Gemini ──
    gemini-pro:
      provider: gemini
      model_id: gemini-2.0-flash
      timeout: 180
      max_tokens: 1048576
      max_output_tokens: 65536

    # ── Kimi (Moonshot) ──
    kimi-k2.5:
      provider: kimi
      model_id: kimi-k2.5
      timeout: 180
      max_tokens: 262144
      max_output_tokens: 16384

    # ── GLM (智谱) ──
    glm-5:
      provider: glm
      model_id: GLM-5
      timeout: 180
      max_tokens: 200000
      max_output_tokens: 16384

    # ── Minimax ──
    minimax-m2.7:
      provider: minimax
      model_id: MiniMax-M2.7-highspeed
      timeout: 180
      max_tokens: 204800
      max_output_tokens: 16384

    # ── Qwen (通义千问) ──
    qwen-3.5-plus:
      provider: qwen
      model_id: qwen3.5-plus
      timeout: 180
      max_tokens: 1000000
      max_output_tokens: 16384

    # ── Deepseek ──
    deepseek-chat:
      provider: deepseek
      model_id: deepseek-chat
      timeout: 180
      max_tokens: 128000
      max_output_tokens: 16384

    # ── Step (阶跃星辰) ──
    step-3.5-flash:
      provider: step
      model_id: step-3.5-flash
      timeout: 180
      max_tokens: 256000
      max_output_tokens: 16384

  default_model: null

# ════════════════════════════════════════════════════
# Agents 配置
# ════════════════════════════════════════════════════
# system_prompt 不在此文件配置，放在 .sensenova-claw/agents/<agent_id>/SYSTEM_PROMPT.md 中
agents:
  default:
    name: Default Agent
    description: 默认 AI Agent
    temperature: 0.6
    tools: []
    skills: []
    # can_send_message_to: null    # null = 禁止向任何 Agent 发消息
    # can_send_message_to: []      # [] = 可以向所有 Agent 发消息（默认）
    # can_send_message_to:         # 仅限指定 Agent
    #   - system-admin

  system-admin:
    name: 系统运维管理员
    description: 系统运维管理员，负责 Sensenova-Claw 平台的配置管理、Agent 管理、工具管理、Skill/Plugin 安装等运维操作
    temperature: 0.2
    tools: [read_file, write_file, bash_command]
    skills: [system-admin-skill]

  office-main:
    name: 办公主助手
    description: 办公任务总调度，负责理解需求并委托给专业 agent
    temperature: 0.2
    tools: [send_message, ask_user]
    skills: []
    max_delegation_depth: 2

  search-agent:
    name: 搜索调研助手
    description: 深度调研特定主题，多轮搜索+内容抓取+生成报告
    temperature: 0.2
    tools: [serper_search, fetch_url, read_file, write_file, image_search, send_message, ask_user]
    skills: [paddleocr-doc-parsing, mineru-document-extractor-choice, research-union, union-search-plus]

  ppt-agent:
    name: PPT 生成助手
    description: 生成 PPT 演示文稿，支持一句话生成
    temperature: 0.2
    tools: [serper_search, fetch_url, read_file, write_file, bash_command, send_message, image_search, ask_user]
    skills: [ppt-superpower, ppt-asset-plan, ppt-html-gen, ppt-image-selection, ppt-page-assets, ppt-page-html, ppt-page-plan, ppt-page-polish, ppt-research-pack, ppt-review, ppt-source-analysis, ppt-speaker-notes, ppt-story-refine, ppt-storyboard, ppt-style-refine, ppt-style-spec, ppt-task-pack, ppt-template-pack]

  data-analyst:
    name: 数据分析助手
    description: 数据分析、可视化和报告生成
    temperature: 0.6
    tools: [read_file, write_file, bash_command, send_message, feishu_doc, ask_user]
    skills: [excel-xlsx, python-dataviz, pdf, csv-pipeline, mineru-document-extractor, openai-whisper-api]

  doc-organizer:
    name: 文档整理助手
    description: 处理多种来源的文档，支持格式转换和整理
    temperature: 0.2
    tools: [read_file, write_file, bash_command, send_message, feishu_doc, feishu-wiki, feishu-drive, ask_user]
    skills: [markdown-converter, docx-cn, excel-xlsx, pdf, pdf-generator, mineru-document-extractor, openai-whisper-api, feishu-doc, feishu-wiki, feishu-drive]

  email-agent:
    name: 邮件助手
    description: 邮件收发、管理和定时提醒
    temperature: 0.2
    tools: [bash_command, read_file, write_file, send_message, send_email, list_emails, read_email, download_attachment, mark_email, search_emails, ask_user]
    skills: []

  proactive-agent:
    name: Proactive Agent
    description: 自主执行定时任务和信息推送的 agent
    temperature: 0.2
    tools: [send_message, fetch_url, read_file, serper_search, memory_search, list_proactive_jobs, create_proactive_job, manage_proactive_job]
    skills: []
    max_send_depth: 2
    enabled: true

# ════════════════════════════════════════════════════
# Proactive Agent 配置
# ════════════════════════════════════════════════════
proactive:
  enabled: false
  max_concurrent_runs: 3
  jobs:
    # 示例：每日新闻简报
    - name: "每日新闻简报"
      enabled: true
      agent_id: proactive-agent
      trigger:
        kind: time
        cron: "0 8 * * *"            # 每天早上 8 点
      task:
        prompt: "搜索并汇总今日重要新闻，输出不超过 10 条的新闻摘要，每条包含标题、来源和一句话概要。"
        use_memory: false
      delivery:
        channels: ["web"]
      safety:
        max_llm_calls: 10
        max_duration_ms: 120000

# ════════════════════════════════════════════════════
# 工具配置
# ════════════════════════════════════════════════════
tools:
  permission:
    enabled: false
    auto_approve_levels: ["low"]       # 自动批准的风险等级
    confirmation_timeout: 60           # 确认超时（秒）
    timeout_action: reject             # 超时策略：reject（拒绝）| approve（批准）| block（无限等待）

  serper_search:
    enabled: true
    api_key: ${SERPER_API_KEY}
    timeout: 15
    max_results: 10

  image_search:
    enabled: true
    api_key: ""   # 留空时复用 SERPER_API_KEY 也可
    timeout: 30
    top_k: 10

# Skills 配置
skills:
  extra_dirs: []
  entries: {}

# 插件配置
plugins:
  feishu:
    enabled: false
    app_id: "${FEISHU_APP_ID}"
    app_secret: "${FEISHU_APP_SECRET}"
    dm_policy: "open"
    group_policy: "mention"
    log_level: "INFO"
  wecom:
    enabled: false
    bot_id: "${WECOM_BOT_ID}"
    secret: "${WECOM_SECRET}"
    websocket_url: "wss://openws.work.weixin.qq.com"
    dm_policy: "open"
    group_policy: "open"
    allowlist: []
    group_allowlist: []
    show_tool_progress: false
  telegram:
    enabled: false
    bot_token: "${TELEGRAM_BOT_TOKEN}"
    mode: "polling"  # polling | webhook
    dm_policy: "open"  # open | allowlist | disabled
    group_policy: "allowlist"  # open | allowlist | disabled
    allowlist: [ ]
    group_allowlist: [ ]
    group_chat_allowlist: [ ]
    require_mention: true
    show_tool_progress: false
    reply_to_message: true
    polling_timeout_seconds: 30
    webhook_url: ""
    webhook_secret: ""
    webhook_path: "/telegram-webhook"
    webhook_host: "127.0.0.1"
    webhook_port: 8787
  discord:
    enabled: false
    bot_token: "${DISCORD_BOT_TOKEN}"
    dm_policy: "open"  # open | allowlist | disabled
    group_policy: "allowlist"  # open | allowlist | disabled
    allowlist: [ ]  # 私聊allow_list
    group_allowlist: [ ]  # 可以在群聊触发的allow_list
    channel_allowlist: [ ]  # 允许的频道id
    require_mention: true  # 群里即使用户和频道都满足，还必须 @bot 才会响应
    show_tool_progress: false
    reply_in_thread: true
  whatsapp:
    enabled: false
    auth_dir: "~/.sensenova-claw/data/plugins/whatsapp/auth"
    typing_indicator: "none"  # composing | none  新用户建议使用none，过于频繁容易limited
    dm_policy: "open"
    group_policy: "open"
    allowlist: []
    group_allowlist: []
    show_tool_progress: false
    bridge:
      command: "node"
      entry: "sensenova_claw/adapters/plugins/whatsapp/bridge/src/index.mjs"
      startup_timeout_seconds: 30
      send_timeout_seconds: 15
