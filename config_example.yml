# AgentOS 配置文件
# 默认路径: ~/.agentos/config.yml

system:
  workspace_dir: ~/.agentos/workspace
  database_path: ~/.agentos/db/agentos.db
  max_concurrent_sessions: 10

# 安全配置（Jupyter-lab 风格 token 认证）
security:
  auth_enabled: true  # 所有 API/WebSocket 需要 token（启动时终端打印）

# ════════════════════════════════════════════════════
# LLM 配置
# ════════════════════════════════════════════════════
llm:
  # Provider 注册表：只描述如何连接各家模型服务
  providers:
    anthropic:
      api_key: ""
      base_url: https://api.anthropic.com
      timeout: 60
      max_retries: 3

    openai:
      api_key: ""
      base_url: https://api.openai.com/v1
      timeout: 60
      max_retries: 3

    gemini:
      api_key: ""
      base_url: https://generativelanguage.googleapis.com
      timeout: 120
      max_retries: 3

  # 模型注册表：统一定义系统中可用的模型
  models:
    claude_opus:
      provider: anthropic
      model_id: claude-opus-4-6
      timeout: 60
      max_output_tokens: 8192

    claude_sonnet:
      provider: anthropic
      model_id: claude-sonnet-4-20250514
      timeout: 60
      max_output_tokens: 8192

    gpt_4o:
      provider: openai
      model_id: gpt-4o
      timeout: 60
      max_output_tokens: 8192

    gpt_4o_mini:
      provider: openai
      model_id: gpt-4o-mini
      timeout: 60
      max_output_tokens: 8192

    gemini_pro:
      provider: gemini
      model_id: gemini-2.5-pro
      timeout: 120
      max_output_tokens: 8192

  # 全局默认模型（引用 models 中的 key）
  default_model: claude_sonnet

# ════════════════════════════════════════════════════
# Agents 配置
# ════════════════════════════════════════════════════
agents:
  default:
    name: Default Agent
    description: 默认 AI Agent
    model: claude_sonnet      # 引用 llm.models 中的 key
    temperature: 0.2
    system_prompt: "你是一个有工具能力的AI助手，请在必要时通过调用工具、使用记忆、或者调用技能来完成任务。"
    tools: []                 # 允许使用的工具（空 = 全部）
    skills: []                # 允许使用的 Skills（空 = 全部）

# ════════════════════════════════════════════════════
# 工具配置
# ════════════════════════════════════════════════════
tools:
  serper_search:
    enabled: true
    api_key: ""
    timeout: 15
    max_results: 10

# Skills 配置
skills:
  extra_dirs: []
  entries: {}

# 插件配置
plugins:
  feishu:
    enabled: false
    app_id: ""
    app_secret: ""
    dm_policy: "open"
    group_policy: "mention"
    log_level: "INFO"
  wecom:
    enabled: false
    bot_id: ""
    secret: ""
    websocket_url: "wss://openws.work.weixin.qq.com"
    dm_policy: "open"
    group_policy: "open"
    allowlist: []
    group_allowlist: []
    show_tool_progress: false
  telegram:
    enabled: false
    bot_token: ""
    mode: "polling"  # polling | webhook
    dm_policy: "open"  # open | allowlist | disabled
    group_policy: "allowlist"  # open | allowlist | disabled
    allowlist: [ ]
    group_allowlist: [ ]
    group_chat_allowlist: [ ]
    require_mention: true
    show_tool_progress: false
    reply_to_message: true
    polling_timeout_seconds: 30
    webhook_url: ""
    webhook_secret: ""
    webhook_path: "/telegram-webhook"
    webhook_host: "127.0.0.1"
    webhook_port: 8787
  whatsapp:
    enabled: false
    auth_dir: "~/.agentos/data/plugins/whatsapp/auth"
    dm_policy: "open"
    group_policy: "open"
    allowlist: []
    group_allowlist: []
    show_tool_progress: false
    bridge:
      command: "node"
      entry: "agentos/adapters/plugins/whatsapp/bridge/src/index.mjs"
      startup_timeout_seconds: 30
      send_timeout_seconds: 15
