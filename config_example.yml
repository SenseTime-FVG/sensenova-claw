# AgentOS 配置文件

system:
  workspace_dir: ~/.agentos/workspace
  database_path: ~/.agentos/db/agentos.db
  max_concurrent_sessions: 10

# 安全配置（Jupyter-lab 风格 token 认证）
security:
  auth_enabled: true  # 所有 API/WebSocket 需要 token（启动时终端打印）

# ════════════════════════════════════════════════════
# LLM 配置
# ════════════════════════════════════════════════════
llm:
  # Provider 注册表：只描述如何连接各家模型服务
  providers:
    anthropic:
      api_key: "sk-ant-oat01-4e8a4c54efb87340e0717e7ad743f4b14ef7374ae983397477732375ea39bdc9"
      base_url: https://api.anthropic.com
      timeout: 60
      max_retries: 3

    openai:
      api_key: "sk-proj-1234567890"
      base_url: https://api.openai.com/v1
      timeout: 60
      max_retries: 3

    gemini:
      api_key: "NalkM8RX0D7RFrhKCvi1"
      base_url: https://genaiapi.cloudsway.net/v1/ai/vEHkTgVnLcrvHENf
      timeout: 120
      max_retries: 3

  # 模型注册表：统一定义系统中可用的模型
  models:
    claude_opus:
      provider: anthropic
      model_id: claude-opus-4-6
      timeout: 60
      max_output_tokens: 8192
      capabilities:
        - chat
        - tools
        - reasoning

    claude_sonnet:
      provider: anthropic
      model_id: claude-sonnet-4-20250514
      timeout: 60
      max_output_tokens: 8192
      capabilities:
        - chat
        - tools

    gpt_4o:
      provider: openai
      model_id: gpt-4o
      timeout: 60
      max_output_tokens: 8192
      capabilities:
        - chat
        - tools
        - vision

    gpt_4o_mini:
      provider: openai
      model_id: gpt-4o-mini
      timeout: 60
      max_output_tokens: 8192
      capabilities:
        - chat
        - tools

    gemini_pro:
      provider: gemini
      model_id: gemini-2.5-pro
      timeout: 120
      max_output_tokens: 8192
      capabilities:
        - chat
        - tools
        - reasoning

  # 全局默认模型（引用 models 中的 key）
  default_model: claude_sonnet

# ════════════════════════════════════════════════════
# Agents 配置
# ════════════════════════════════════════════════════
# 每个 agent 的详细配置放在 ~/.agentos/agents/{id}/config.yml
# 这里只声明 agent id 列表
agents:
  - default

# ════════════════════════════════════════════════════
# 工具配置
# ════════════════════════════════════════════════════
tools:
  serper_search:
    enabled: true
    api_key: ""
    timeout: 15
    max_results: 10

# Skills 配置
skills:
  extra_dirs:
    - ./backend/app/skills/feishu
  entries:
    feishu-doc:
      enabled: true
    feishu-wiki:
      enabled: true
    feishu-drive:
      enabled: true
    feishu-perm:
      enabled: true

# 插件配置
plugins:
  feishu:
    enabled: false
    app_id: ""
    app_secret: ""
    dm_policy: "open"
    group_policy: "mention"
    log_level: "INFO"
  wecom:
    enabled: false
    bot_id: ""
    secret: ""
    websocket_url: "wss://openws.work.weixin.qq.com"
    dm_policy: "open"
    group_policy: "open"
    allowlist: []
    group_allowlist: []
    show_tool_progress: false
  telegram:
    enabled: false
    bot_token: ""
    mode: "polling"  # polling | webhook
    dm_policy: "open"  # open | allowlist | disabled
    group_policy: "allowlist"  # open | allowlist | disabled
    allowlist: [ ]
    group_allowlist: [ ]
    group_chat_allowlist: [ ]
    require_mention: true
    show_tool_progress: false
    reply_to_message: true
    polling_timeout_seconds: 30
    webhook_url: ""
    webhook_secret: ""
    webhook_path: "/telegram-webhook"
    webhook_host: "127.0.0.1"
    webhook_port: 8787
  whatsapp:
    enabled: false
    auth_dir: ".agentos/data/channels/whatsapp/auth"
    dm_policy: "open"
    group_policy: "open"
    allowlist: []
    group_allowlist: []
    show_tool_progress: false
    bridge:
      command: "node"
      entry: "agentos/adapters/channels/whatsapp/bridge/src/index.mjs"
      startup_timeout_seconds: 30
      send_timeout_seconds: 15
