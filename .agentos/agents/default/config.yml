# Default Agent 配置
# model 引用 config.yml 中 llm.models 的 key

name: Default Agent
description: 默认 AI Agent

model: claude_sonnet
temperature: 0.2
max_turns_per_session: 50
system_prompt: "你是一个有工具能力的AI助手，请在必要时通过调用工具、使用记忆、或者调用技能来完成任务。"

# 允许使用的工具（空 = 全部）
tools: []

# 允许使用的 Skills（空 = 全部）
skills: []

# 可委托的 Agent（空 = 全部）
can_send_message_to: []
max_send_depth: 3
max_pingpong_turns: 10
