tools:
  permission:
    enabled: false
    auto_approve_levels:
    - high
    confirmation_timeout: 60
    timeout_action: reject
skills:
  extra_dirs: []
  entries: {}
proactive:
  enabled: true
  max_concurrent_runs: 3
  jobs:
  - name: 偏好发现与推送管理
    enabled: true
    agent_id: proactive-agent
    trigger:
      kind: time
      cron: 0 12 * * *
    task:
      prompt: "你是每日信息推送助手。按以下步骤执行：\n\n## 步骤一：偏好发现\n调用 memory_search 搜索用户的行为偏好。\n分析结果，提取明确的、反复出现的兴趣主题（如\"\
        AI新闻\"、\"Python技术\"、\"股市\"等）。\n单次提及不算偏好，需要多次出现才确认。\n\n## 步骤二：内容搜索\n根据步骤一的结果：\n\
        - 如果发现了明确偏好：针对每个偏好主题调用 serper_search 搜索今日相关内容\n- 如果未发现偏好：执行以下默认搜索\n  1. 调用\
        \ serper_search(query=\"今日重要新闻 新华社 人民日报\") 搜索当日新闻\n  2. 调用 memory_search(query=\"\
        用户所在城市 位置 地点\") 查找用户城市\n    - 找到城市 → 调用 serper_search(query=\"{城市}今日天气预报\"\
        )\n    - 未找到 → 跳过天气\n\n## 步骤三：整理输出\n将搜索结果整理为简洁的推送内容：\n- 每条信息包含标题和一句话摘要\n-\
        \ 总条数不超过 10 条\n- 如有天气信息，放在最前面\n"
      use_memory: true
    delivery:
      channels:
      - web
    safety:
      max_llm_calls: 50
      max_duration_ms: 2400000

