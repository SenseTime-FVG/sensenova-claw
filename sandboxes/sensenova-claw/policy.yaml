# Sensenova-Claw sandbox 策略
# 文件系统隔离 + 网络出站放行

version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /proc
    - /dev/urandom
    - /etc
    - /opt/sensenova-claw
    - /var/log
  read_write:
    - /sandbox
    - /tmp
    - /dev/null
    - /home/sandbox/.sensenova-claw

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  allow-all:
    name: allow-all-outbound
    binaries:
      - path: "/**"
    endpoints:
      - host: "*.*"
        port: 443
        enforcement: audit
      - host: "*.*"
        port: 80
        enforcement: audit
      - host: "*.*.*"
        port: 443
        enforcement: audit
      - host: "*.*.*"
        port: 80
        enforcement: audit
      - host: "*.*.*.*"
        port: 443
        enforcement: audit
      - host: "*.*.*.*"
        port: 80
        enforcement: audit
