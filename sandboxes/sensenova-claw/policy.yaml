# Sensenova-Claw sandbox 策略
# 文件系统隔离 + 尽量开放的网络出站（HTTPS/HTTP）
#
# 注意：OpenShell 策略校验器禁止 host: "*" 以及 *.com 这类 TLD 通配，
# 因此只能按 "*.example.com" 形式枚举。新增目的地需追加条目并重新下发。

version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /proc
    - /dev/urandom
    - /etc
    - /opt/sensenova-claw
    - /var/log
    - /home/sandbox
  read_write:
    - /sandbox
    - /tmp
    - /dev/null
    - /home/sandbox/.sensenova-claw

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  internet-access:
    name: internet-access
    binaries:
      - path: "/**"
    endpoints:
      # ── LLM Providers ──
      - { host: "*.openai.com",        port: 443, protocol: rest, enforcement: enforce, access: full }
      - { host: "*.anthropic.com",     port: 443, protocol: rest, enforcement: enforce, access: full }
      - { host: "*.claude.ai",         port: 443, protocol: rest, enforcement: enforce, access: full }
      - { host: "*.googleapis.com",    port: 443, protocol: rest, enforcement: enforce, access: full }
      - { host: "*.google.com",        port: 443, protocol: rest, enforcement: enforce, access: full }
      - { host: "*.azure.com",         port: 443, protocol: rest, enforcement: enforce, access: full }
      - { host: "*.microsoft.com",     port: 443, protocol: rest, enforcement: enforce, access: full }
      - { host: "*.minimax.chat",      port: 443, protocol: rest, enforcement: enforce, access: full }
      - { host: "*.uniapi.io",         port: 443, protocol: rest, enforcement: enforce, access: full }
      - { host: "*.aliyuncs.com",      port: 443, protocol: rest, enforcement: enforce, access: full }
      - { host: "*.aliyun.com",        port: 443, protocol: rest, enforcement: enforce, access: full }
      - { host: "*.dashscope.com",     port: 443, protocol: rest, enforcement: enforce, access: full }
      - { host: "*.deepseek.com",      port: 443, protocol: rest, enforcement: enforce, access: full }
      - { host: "*.moonshot.cn",       port: 443, protocol: rest, enforcement: enforce, access: full }
      - { host: "*.zhipuai.cn",        port: 443, protocol: rest, enforcement: enforce, access: full }
      - { host: "*.bigmodel.cn",       port: 443, protocol: rest, enforcement: enforce, access: full }
      - { host: "*.mistral.ai",        port: 443, protocol: rest, enforcement: enforce, access: full }
      - { host: "*.openrouter.ai",     port: 443, protocol: rest, enforcement: enforce, access: full }
      - { host: "*.volces.com",        port: 443, protocol: rest, enforcement: enforce, access: full }
      - { host: "*.volcengine.com",    port: 443, protocol: rest, enforcement: enforce, access: full }
      - { host: "*.groq.com",          port: 443, protocol: rest, enforcement: enforce, access: full }
      - { host: "*.x.ai",              port: 443, protocol: rest, enforcement: enforce, access: full }
      - { host: "*.cohere.ai",         port: 443, protocol: rest, enforcement: enforce, access: full }
      - { host: "*.cohere.com",        port: 443, protocol: rest, enforcement: enforce, access: full }
      - { host: "*.together.ai",       port: 443, protocol: rest, enforcement: enforce, access: full }
